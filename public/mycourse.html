<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Courses - BR30trader01</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #courseContent {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }

    .course-card {
      border: 1px solid #ddd;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .course-card h3 {
      color: #0077ff;
      margin-bottom: 10px;
    }

    .course-card p {
      color: #000;
      font-size: 16px;
    }

    button {
      background-color: #0077ff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-title">
      <img src="images/BR30TRADER.png" alt="logo" class="logo">
      <h1>BR30ᴛʀᴀᴅᴇʀ</h1>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <div id="courseContent"></div>

  <script>
    const courseDiv = document.getElementById("courseContent");
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first!");
      window.location.href = "login.html";
    } else {
      fetchMyCourses();
    }

    async function fetchMyCourses() {
      try {
        courseDiv.innerHTML = "<p>Loading your courses...</p>";

        const res = await fetch('http://localhost:5000/api/courses/my-courses', {
          method: 'GET',
          headers: {
            'x-auth-token': token
          }
        });

        const courses = await res.json();

        if (res.status === 401 || res.status === 403) {
          alert("Session expired, please login again.");
          window.location.href = "login.html";
          return;
        }

        if (!courses || courses.length === 0) {
          courseDiv.innerHTML = `
                    <h2>No Courses Found 🔒</h2>
                    <p>Aapne abhi tak koi course purchase nahi kiya hai.</p>
                    <button onclick="window.location.href='index.html#postersection'">Click here to Bye....</button>
                `;
          return;
        }

        let html = `<h2>Welcome Back!</h2><p>Your purchased courses:</p>`;

        courses.forEach(course => {
          const thumbUrl = `http://localhost:5000${course.thumbnail}`;

          html += `
                  <div class="course-card">
                    <img src="${thumbUrl}" alt="${course.title}" style="width:100%; border-radius:10px; margin-bottom:10px;">
                    <h3>${course.title}</h3>
                    <p>${course.description}</p>
                    <button onclick="watchCourse('${course._id}')">Watch Now</button>
                  </div>
                `;
        });
        courseDiv.innerHTML = html;

      } catch (err) {
        console.error("Error:", err);
        courseDiv.innerHTML = "<p>Plese Pahle login kre.</p>";
      }
    }

    function watchCourse(courseId) {
      window.location.href = `watch.html?id=${courseId}`;
    }
  </script>


</body>

</html>
